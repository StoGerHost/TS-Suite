<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0c">
<title>STOBER Werkzeuge — Admin</title>
<style>
  :root{
    --bg:#0a0a0c;
    --surface:#111318;
    --surface-hover:#141821;
    --surface-alt:#0d0f13;
    --ink:#e9edf2;
    --ink-80:rgba(233,237,242,.8);
    --ink-70:rgba(233,237,242,.7);
    --ink-60:rgba(233,237,242,.6);
    --ink-50:rgba(233,237,242,.5);
    --ink-45:rgba(233,237,242,.45);
    --ink-40:rgba(233,237,242,.4);
    --accent:#3a7bd5;
    --accent-dark:#2f66b3;
    --glow:#5eead4;
    --danger:#e05a4e;
    --line-20:rgba(58,123,213,.2);
    --line-25:rgba(58,123,213,.25);
    --line-30:rgba(58,123,213,.3);
    --line-35:rgba(58,123,213,.35);
    --font-display:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    --font-mono:ui-monospace,'JetBrains Mono','SFMono-Regular',Consolas,Menlo,monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-display);line-height:1.55;
    -webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:60px;
    background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:34px 34px;}
  input,button{font-family:inherit;}
  a{color:inherit;}

  .stober-backbar{position:sticky;top:0;z-index:99999;display:flex;align-items:center;gap:10px;
    background:#0a0a0c;color:#e9edf2;padding:10px 16px;
    font:600 12px/1.4 var(--font-mono);letter-spacing:.03em;border-bottom:1px solid var(--line-35);flex-wrap:wrap;}
  .stober-backbar__link{color:#e9edf2;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
    transition:color .15s ease;white-space:nowrap;}
  .stober-backbar__link:hover{color:var(--accent);}
  .stober-backbar__slash{color:var(--ink-40);}
  .stober-backbar__current{color:var(--accent);font-weight:700;}

  #hdr{padding:26px 18px 22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line-20);}
  #hdr .ico{width:38px;height:38px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0;}
  #hdr h1{font:700 19px var(--font-display);color:#fff;}
  #hdr p{font:500 12px var(--font-mono);color:var(--ink-45);margin-top:3px;letter-spacing:.02em;}

  .wrap{max-width:900px;margin:0 auto;padding:22px 18px;}
  @media(max-width:480px){.wrap{padding:18px 14px;}}

  .tabs{display:flex;gap:10px;margin-bottom:20px;}
  .tab-btn{flex:1;padding:12px 10px;border-radius:2px;border:1px solid var(--line-30);background:var(--surface);
    font:700 12.5px var(--font-mono);letter-spacing:.03em;text-transform:uppercase;color:var(--ink-60);cursor:pointer;
    transition:.15s;}
  .tab-btn.active{border-color:var(--accent);color:var(--accent);background:var(--surface-hover);}

  .panel{display:none;}
  .panel.active{display:block;}

  .card{background:var(--surface);border:1px solid var(--line-30);padding:20px;margin-bottom:16px;}
  .card h2{font:700 15px var(--font-display);color:var(--ink);margin-bottom:6px;}
  .card .hint{font:400 12.5px/1.55 var(--font-display);color:var(--ink-50);margin-bottom:16px;}

  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .row input{flex:1;min-width:120px;padding:11px 12px;border:1px solid var(--line-30);border-radius:2px;
    background:var(--bg);color:var(--ink);font-size:14px;outline:none;transition:border-color .15s;}
  .row input::placeholder{color:var(--ink-40);}
  .row input:focus{border-color:var(--accent);}

  .btn{padding:11px 16px;border:1px solid transparent;border-radius:2px;background:var(--accent);color:var(--bg);
    font:700 12.5px var(--font-mono);letter-spacing:.02em;cursor:pointer;white-space:nowrap;transition:filter .15s,border-color .15s,color .15s,background .15s;}
  .btn:hover{filter:brightness(1.1);}
  .btn.ghost{background:transparent;color:var(--ink-70);border-color:var(--line-30);}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn.danger{background:var(--danger);color:#1a0d0b;}
  .btn.small{padding:6px 10px;font-size:11px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:8px 6px;color:var(--ink-40);font:600 10.5px var(--font-mono);text-transform:uppercase;
    letter-spacing:.05em;border-bottom:1px solid var(--line-25);}
  td{padding:9px 6px;border-bottom:1px solid var(--line-20);vertical-align:middle;color:var(--ink-80);}
  tr:last-child td{border-bottom:none;}
  .mono{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-45);}
  .src-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.03em;font-family:var(--font-mono);
    text-transform:uppercase;display:inline-block;}
  .src-lokal{background:rgba(58,123,213,.15);color:var(--accent);}
  .src-zentral{background:rgba(94,234,212,.12);color:var(--glow);}
  .src-leer{background:rgba(224,90,78,.14);color:var(--danger);}
  .src-standard{background:rgba(233,237,242,.08);color:var(--ink-45);}

  .toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;cursor:pointer;}
  .toggle input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;}
  .toggle .track{position:absolute;inset:0;background:var(--bg);border:1.5px solid var(--line-30);border-radius:2px;transition:.15s;}
  .toggle .track::before{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:var(--ink-45);border-radius:1px;transition:.15s;}
  .toggle input:checked ~ .track{background:rgba(58,123,213,.15);border-color:var(--accent);}
  .toggle input:checked ~ .track::before{transform:translateX(16px);background:var(--accent);}

  .empty{color:var(--ink-40);font-size:13px;padding:14px 4px;text-align:center;}

  .search{margin-bottom:16px;}
  .search input{width:100%;padding:12px 14px;border:1px solid var(--line-30);border-radius:2px;
    background:var(--bg);color:var(--ink);font-size:14px;outline:none;}
  .search input:focus{border-color:var(--accent);}
  .search input::placeholder{color:var(--ink-40);}

  .group-head{display:flex;align-items:center;gap:8px;margin:22px 0 10px;font:700 13.5px var(--font-display);color:var(--ink);}
  .group-head .mark{width:8px;height:8px;border:1.5px solid var(--accent);flex-shrink:0;}
  .subgroup-head{font:600 11px var(--font-mono);text-transform:uppercase;letter-spacing:.05em;color:var(--ink-40);
    margin:14px 0 6px;}

  .art-row input{width:120px;padding:7px 9px;border:1px solid var(--line-25);border-radius:2px;
    background:var(--bg);color:var(--ink);font-size:12.5px;}
  .art-row td:first-child{max-width:260px;}
  .key-label{font-weight:600;font-size:12.5px;color:var(--ink);}

  .export-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--ink);
    border:1px solid var(--accent);padding:11px 20px;border-radius:2px;font:600 12.5px var(--font-mono);
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:99999;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>

<div class="stober-backbar">
  <a href="index.html" class="stober-backbar__link">&larr; STOBER Werkzeuge</a>
  <span class="stober-backbar__slash" aria-hidden="true">/</span>
  <a href="#" id="referer-link" class="stober-backbar__link" style="display:none"></a>
  <span class="stober-backbar__slash" id="referer-slash" aria-hidden="true" style="display:none">/</span>
  <span class="stober-backbar__current">Admin</span>
</div>

<div id="hdr">
  <span class="ico" aria-hidden="true">&#9881;</span>
  <div>
    <h1>Admin-Bereich</h1>
    <p>Mitarbeitercodes, Artikelnummern &amp; Sichtbarkeit &middot; lokal auf diesem Gerät</p>
  </div>
</div>

<div class="wrap" id="admin-gate">
  <div class="card" style="max-width:360px;margin:60px auto 0;text-align:center">
    <h2>Zugang geschützt</h2>
    <p class="hint">Bitte Passwort eingeben, um den Admin-Bereich zu öffnen.</p>
    <div class="row" style="justify-content:center">
      <input id="admin-gate-pw" type="password" placeholder="Passwort" autocomplete="off" style="text-align:center">
    </div>
    <button class="btn" id="admin-gate-btn" style="width:100%">Entsperren</button>
    <p class="hint" id="admin-gate-error" style="display:none;color:var(--danger);margin-top:10px">Falsches Passwort.</p>
  </div>
</div>

<div class="wrap" id="admin-wrap" style="display:none"></div>

<div class="toast" id="toast"></div>

<script>

// ─── Referer (welcher Konfigurator hat hierher verlinkt) ───────────────────
(function(){
  var ref = sessionStorage.getItem('stober_admin_referer');
  if(ref){
    var link=document.getElementById('referer-link'), slash=document.getElementById('referer-slash');
    var label = ref.indexOf('schiebetuer')>-1 ? 'Schiebetür-Konfigurator' : 'Drehtür-Konfigurator';
    link.textContent = '\u2190 ' + label;
    link.href = ref;
    link.style.display = 'inline-flex';
    slash.style.display = 'inline';
  }
})();

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(function(){t.classList.remove('show');},2200);
}

// ═══════════════════ MITARBEITERCODES ═══════════════════
var MA_LOCAL_KEY='stober_ma_codes_local';
var MA_CENTRAL={};

function loadLocalCodes(){
  try{ return JSON.parse(localStorage.getItem(MA_LOCAL_KEY)||'{}'); }catch(e){ return {}; }
}
function saveLocalCodes(obj){ localStorage.setItem(MA_LOCAL_KEY, JSON.stringify(obj)); }

function renderCodes(){
  var local = loadLocalCodes();
  var localKeys = Object.keys(local).sort();
  var tb = document.querySelector('#tbl-local tbody'); tb.innerHTML='';
  document.getElementById('local-empty').style.display = localKeys.length ? 'none' : 'block';
  localKeys.forEach(function(code){
    var tr=document.createElement('tr');
    tr.innerHTML = '<td class="mono">'+esc(code)+'</td><td>'+esc(local[code])+'</td>'+
      '<td style="text-align:right"><button class="btn danger small" onclick="removeCode(\''+esc(code)+'\')">Entfernen</button></td>';
    tb.appendChild(tr);
  });

  var centralKeys = Object.keys(MA_CENTRAL).sort();
  var tbc = document.querySelector('#tbl-central tbody'); tbc.innerHTML='';
  document.getElementById('central-empty').style.display = centralKeys.length ? 'none' : 'block';
  centralKeys.forEach(function(code){
    var tr=document.createElement('tr');
    tr.innerHTML = '<td class="mono">'+esc(code)+'</td><td>'+esc(MA_CENTRAL[code])+'</td>';
    tbc.appendChild(tr);
  });
}

function addCode(){
  var code=document.getElementById('new-code').value.trim();
  var name=document.getElementById('new-name').value.trim();
  if(!code || !name){ toast('Bitte Code und Name eingeben'); return; }
  if(MA_CENTRAL[code]){ toast('Code existiert bereits zentral: '+MA_CENTRAL[code]); return; }
  var local=loadLocalCodes();
  local[code]=name;
  saveLocalCodes(local);
  document.getElementById('new-code').value='';
  document.getElementById('new-name').value='';
  renderCodes();
  toast('Code hinzugefügt (lokal auf diesem Gerät)');
}
function removeCode(code){
  var local=loadLocalCodes();
  delete local[code];
  saveLocalCodes(local);
  renderCodes();
  toast('Code entfernt');
}
function exportCodes(){
  var merged=Object.assign({}, MA_CENTRAL, loadLocalCodes());
  downloadJSON(merged, 'ma-codes.json');
}

function loadLocalArtikel(){
  try{ return JSON.parse(localStorage.getItem(ART_LOCAL_KEY)||'{}'); }catch(e){ return {}; }
}
function saveLocalArtikel(obj){ localStorage.setItem(ART_LOCAL_KEY, JSON.stringify(obj)); }

function prettyLabel(rest){
  return rest.split('.').map(function(s){ return s.charAt(0).toUpperCase()+s.slice(1); }).join(' \u203a ');
}

function effectiveValue(fullKey, centralVal){
  var local = loadLocalArtikel();
  if(local[fullKey]!==undefined && local[fullKey]!=='') return {val:local[fullKey], src:'lokal'};
  if(centralVal!==undefined && centralVal!=='') return {val:centralVal, src:'zentral'};
  return {val:'', src:'leer'};
}

function renderArtikel(){
  var q = document.getElementById('art-search').value.trim().toLowerCase();
  var container = document.getElementById('artikel-groups');
  container.innerHTML = '';

  Object.keys(ART_GROUPED).forEach(function(tool){
    var toolHasMatch = false;
    var toolHtml = '<div class="group-head"><span class="mark" aria-hidden="true"></span>'+esc(TOOL_LABEL[tool]||tool)+'</div>';

    Object.keys(ART_GROUPED[tool]).forEach(function(marke){
      var rows = ART_GROUPED[tool][marke];
      var visibleRows = rows.filter(function(r){
        var rest=r[0], fullKey=r[1];
        var label = prettyLabel(rest);
        var hay = (label+' '+fullKey+' '+(MARKEN_LABEL[marke]||marke)).toLowerCase();
        return !q || hay.indexOf(q) > -1;
      });
      if(!visibleRows.length) return;
      toolHasMatch = true;
      toolHtml += '<div class="subgroup-head">'+esc(MARKEN_LABEL[marke]||marke)+'</div>';
      toolHtml += '<table class="art-row"><tbody>';
      visibleRows.forEach(function(r){
        var rest=r[0], fullKey=r[1], centralVal=r[2];
        var eff = effectiveValue(fullKey, centralVal);
        var srcClass = eff.src==='lokal' ? 'src-lokal' : (eff.src==='zentral' ? 'src-zentral' : 'src-leer');
        var srcLabel = eff.src==='lokal' ? 'Lokal' : (eff.src==='zentral' ? 'Zentral' : 'Leer');
        toolHtml += '<tr>'+
          '<td><div class="key-label">'+esc(prettyLabel(rest))+'</div><div class="mono">'+esc(fullKey)+'</div></td>'+
          '<td><span class="src-tag '+srcClass+'">'+srcLabel+'</span></td>'+
          '<td><input type="text" data-key="'+esc(fullKey)+'" value="'+esc(eff.val)+'" placeholder="Artikelnr."></td>'+
          '<td style="white-space:nowrap"><button class="btn small" onclick="saveArtikelRow(this)">Speichern</button> '+
          '<button class="btn ghost small" onclick="resetArtikelRow(this)">&#8635;</button></td>'+
          '</tr>';
      });
      toolHtml += '</tbody></table>';
    });

    if(toolHasMatch) container.innerHTML += toolHtml;
  });

  if(!container.innerHTML){
    container.innerHTML = '<p class="empty">Keine Treffer.</p>';
  }
}

function saveArtikelRow(btn){
  var tr = btn.closest('tr');
  var input = tr.querySelector('input[data-key]');
  var key = input.dataset.key;
  var val = input.value.trim();
  var local = loadLocalArtikel();
  if(val){ local[key]=val; } else { delete local[key]; }
  saveLocalArtikel(local);
  toast('Gespeichert (lokal auf diesem Gerät)');
  renderArtikel();
}
function resetArtikelRow(btn){
  var tr = btn.closest('tr');
  var input = tr.querySelector('input[data-key]');
  var key = input.dataset.key;
  var local = loadLocalArtikel();
  delete local[key];
  saveLocalArtikel(local);
  toast('Lokale Überschreibung entfernt');
  renderArtikel();
}
function resetArtikelLocal(){
  localStorage.removeItem(ART_LOCAL_KEY);
  renderArtikel();
  toast('Alle lokalen Artikelnummern zurückgesetzt');
}
function exportArtikel(){
  var merged = Object.assign({}, ART_CENTRAL, loadLocalArtikel());
  downloadJSON(merged, 'artikel.json');
}

// ═══════════════════ SICHTBARKEIT (Hersteller im Drehtür-Konfigurator) ═══════════════════
var SICHT_LOCAL_KEY='stober_hersteller_sichtbar';
var SICHT_CENTRAL={};
var SICHT_DEFAULTS={dk:true, rc:true, gi:true, gz:true};
var SICHT_ORDER=['dk','rc','gi','gz'];

function loadLocalSicht(){
  try{ return JSON.parse(localStorage.getItem(SICHT_LOCAL_KEY)||'{}'); }catch(e){ return {}; }
}
function saveLocalSicht(obj){ localStorage.setItem(SICHT_LOCAL_KEY, JSON.stringify(obj)); }

function effectiveVisibility(prefix){
  var local = loadLocalSicht();
  if(local[prefix]!==undefined) return {val:!!local[prefix], src:'lokal'};
  if(SICHT_CENTRAL[prefix]!==undefined) return {val:!!SICHT_CENTRAL[prefix], src:'zentral'};
  return {val: SICHT_DEFAULTS[prefix]!==undefined ? SICHT_DEFAULTS[prefix] : true, src:'standard'};
}

function renderSichtbarkeit(){
  var tbody = document.querySelector('#tbl-sichtbarkeit tbody');
  var local = loadLocalSicht();
  tbody.innerHTML = '';
  SICHT_ORDER.forEach(function(prefix){
    var eff = effectiveVisibility(prefix);
    var srcClass = eff.src==='lokal' ? 'src-lokal' : (eff.src==='zentral' ? 'src-zentral' : 'src-standard');
    var srcLabel = eff.src==='lokal' ? 'Lokal' : (eff.src==='zentral' ? 'Zentral' : 'Standard');
    var hasLocal = local[prefix]!==undefined;
    tbody.innerHTML += '<tr>'+
      '<td><div class="key-label">'+esc(MARKEN_LABEL[prefix]||prefix)+'</div></td>'+
      '<td><span class="src-tag '+srcClass+'">'+srcLabel+'</span></td>'+
      '<td><label class="toggle"><input type="checkbox" data-prefix="'+prefix+'" '+(eff.val?'checked':'')+' onchange="toggleSichtbarkeit(this)"><span class="track"></span></label></td>'+
      '<td>'+(hasLocal?'<button class="btn ghost small" onclick="resetSichtbarkeitRow(\''+prefix+'\')">&#8635;</button>':'')+'</td>'+
      '</tr>';
  });
}
function toggleSichtbarkeit(input){
  var prefix = input.dataset.prefix;
  var local = loadLocalSicht();
  local[prefix] = input.checked;
  saveLocalSicht(local);
  toast((MARKEN_LABEL[prefix]||prefix)+(input.checked?' eingeblendet':' ausgeblendet')+' (lokal auf diesem Gerät)');
  renderSichtbarkeit();
}
function resetSichtbarkeitRow(prefix){
  var local = loadLocalSicht();
  delete local[prefix];
  saveLocalSicht(local);
  toast('Lokale Überschreibung entfernt');
  renderSichtbarkeit();
}
function resetSichtbarkeitLocal(){
  localStorage.removeItem(SICHT_LOCAL_KEY);
  renderSichtbarkeit();
  toast('Alle lokalen Sichtbarkeits-Änderungen zurückgesetzt');
}
function exportSichtbarkeit(){
  var merged = Object.assign({}, SICHT_DEFAULTS, SICHT_CENTRAL, loadLocalSicht());
  downloadJSON(merged, 'hersteller-sichtbar.json');
}

// ─── Init (nach Freischaltung) ────────────────────────────────────────────
function initAdminApp(){
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
      btn.classList.add('active');
      document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    });
  });

  fetch('ma-codes.json',{cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('fetch failed'); return r.json(); })
    .then(function(json){ MA_CENTRAL=json; renderCodes(); })
    .catch(function(){ renderCodes(); });

  fetch('artikel.json',{cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('fetch failed'); return r.json(); })
    .then(function(json){ ART_CENTRAL=json; renderArtikel(); })
    .catch(function(){ renderArtikel(); });
  renderArtikel();

  fetch('hersteller-sichtbar.json',{cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('fetch failed'); return r.json(); })
    .then(function(json){ SICHT_CENTRAL=json||{}; renderSichtbarkeit(); })
    .catch(function(){ renderSichtbarkeit(); });
}

// ─── Utils ──────────────────────────────────────────────────────────────
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function downloadJSON(obj, filename){
  var sorted = {};
  Object.keys(obj).sort().forEach(function(k){ sorted[k]=obj[k]; });
  var blob = new Blob([JSON.stringify(sorted, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(filename+' heruntergeladen');
}

function b64DecodeUnicode(str){
  var binary = atob(str);
  var bytes = new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++){ bytes[i] = binary.charCodeAt(i); }
  return new TextDecoder('utf-8').decode(bytes);
}

function sha256Hex(str){
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(function(buf){
    return Array.prototype.map.call(new Uint8Array(buf), function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  });
}

  document.getElementById('admin-gate').style.display = 'none';

}

}
