<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRM">
<title>Blueprint · CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#0a0a0c; --panel:#131318; --panel2:#191921; --border:#26262e;
  --blau:#3a7bd5; --tuerkis:#5eead4; --text:#e8e8ec; --dim:#8b8b96;
  --rot:#e05d5d; --gelb:#e0b45d; --gruen:#5dc98a;
  --mono:ui-monospace,'SF Mono','Cascadia Mono',Consolas,monospace;
  --nav-h:62px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  min-height:100dvh;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{
  font:inherit;color:var(--text);background:var(--panel2);
  border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;width:100%;min-height:48px;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blau)}
textarea{min-height:96px;resize:vertical}
label{display:block;font-size:.78rem;color:var(--dim);margin:14px 0 6px;
  font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em}

/* Kopfzeile */
header{
  position:sticky;top:0;z-index:20;background:rgba(10,10,12,.92);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--border);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  display:flex;align-items:center;gap:10px;
}
header .logo{font-family:var(--mono);font-size:.95rem;letter-spacing:.04em}
header .logo b{color:var(--tuerkis);font-weight:600}
header .status{margin-left:auto;font-family:var(--mono);font-size:.7rem;color:var(--dim);
  display:flex;align-items:center;gap:6px}
header .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
header .dot.ok{background:var(--gruen)}
header .dot.err{background:var(--rot)}

main{max-width:760px;margin:0 auto;padding:14px 14px 24px}

/* Suchfeld */
.suchzeile{position:sticky;top:calc(49px + env(safe-area-inset-top));z-index:15;
  padding:6px 0 10px;background:linear-gradient(var(--bg) 75%,transparent)}
.suchzeile input{background:var(--panel)}

/* Kundenkarte — Karteikarten-Look mit Blueprint-Raster im Kopf */
.karte{
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
  margin-bottom:10px;overflow:hidden;display:block;width:100%;text-align:left;
}
.karte:active{border-color:var(--blau)}
.karte .kopf{
  padding:10px 14px 8px;border-bottom:1px solid var(--border);
  background:
    repeating-linear-gradient(0deg,transparent 0 11px,rgba(58,123,213,.07) 11px 12px),
    repeating-linear-gradient(90deg,transparent 0 11px,rgba(58,123,213,.07) 11px 12px);
  display:flex;align-items:baseline;gap:10px;
}
.karte .knr{font-family:var(--mono);font-size:.72rem;color:var(--tuerkis)}
.karte .ort{margin-left:auto;font-size:.75rem;color:var(--dim);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.karte .rumpf{padding:10px 14px 12px}
.karte h3{font-size:1rem;font-weight:600;margin-bottom:2px}
.karte .sub{font-size:.8rem;color:var(--dim)}

/* Abschnitte / Panels */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:12px}
.eyebrow{font-family:var(--mono);font-size:.7rem;color:var(--dim);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.eyebrow .plus{margin-left:auto;color:var(--tuerkis);font-size:1rem;padding:4px 8px}

/* Aktions-Buttons (anrufen / mail / karte) */
.aktionen{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.aktionen a,.aktionen button{
  flex:1 1 auto;min-width:80px;min-height:48px;display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  color:var(--text);text-decoration:none;font-size:.85rem;
}
.aktionen a:active{border-color:var(--tuerkis)}

/* Timeline */
.tl{list-style:none}
.tl li{position:relative;padding:0 0 14px 22px;border-left:1px solid var(--border);
  margin-left:6px}
.tl li:last-child{padding-bottom:2px}
.tl li::before{content:'';position:absolute;left:-5px;top:4px;width:9px;height:9px;
  border-radius:50%;background:var(--bg);border:2px solid var(--blau)}
.tl li.t-wartung::before{border-color:var(--tuerkis)}
.tl li.t-reklamation::before{border-color:var(--rot)}
.tl .tlkopf{display:flex;gap:8px;align-items:baseline;font-size:.72rem;
  font-family:var(--mono);color:var(--dim);margin-bottom:3px}
.tl .tltyp{color:var(--blau);text-transform:uppercase;letter-spacing:.05em}
.tl li.t-wartung .tltyp{color:var(--tuerkis)}
.tl li.t-reklamation .tltyp{color:var(--rot)}
.tl p{font-size:.9rem;white-space:pre-wrap}
.tl .artchips{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}

/* Chips */
.chip{font-family:var(--mono);font-size:.72rem;color:var(--tuerkis);
  border:1px solid rgba(94,234,212,.35);border-radius:99px;padding:3px 10px}
.chip.blau{color:var(--blau);border-color:rgba(58,123,213,.4)}
.chip button{color:var(--rot);margin-left:6px;padding:0}

/* Wiedervorlagen */
.wv{display:flex;align-items:flex-start;gap:12px;padding:12px 4px;
  border-bottom:1px solid var(--border)}
.wv:last-child{border-bottom:none}
.wv .box{width:26px;height:26px;min-width:26px;border:2px solid var(--dim);
  border-radius:8px;margin-top:2px;display:flex;align-items:center;justify-content:center;
  color:transparent;font-size:.9rem}
.wv.erledigt .box{border-color:var(--gruen);color:var(--gruen)}
.wv.erledigt .txt{text-decoration:line-through;color:var(--dim)}
.wv .datum{font-family:var(--mono);font-size:.72rem;color:var(--dim)}
.wv .datum.faellig{color:var(--rot)}
.wv .datum.heute{color:var(--gelb)}
.wv .kunde{font-size:.75rem;color:var(--blau)}
.wv .trello-btn{
  display:inline-flex;align-items:center;gap:7px;flex-shrink:0;white-space:nowrap;
  padding:9px 16px;min-height:40px;border-radius:99px;
  border:1px solid rgba(0,132,209,.45);background:rgba(0,132,209,.14);
  color:#5eb8f5;font-size:.8rem;font-weight:600;
}
.wv .trello-btn.gesendet{
  border-color:var(--border);background:var(--panel2);color:var(--dim);font-weight:400;
}
.wv .trello-btn:active{background:rgba(0,132,209,.26)}

/* Artikel-Liste */
.artzeile{display:flex;align-items:center;gap:12px;padding:12px 4px;
  border-bottom:1px solid var(--border);width:100%;text-align:left}
.artzeile:last-child{border-bottom:none}
.artzeile .nr{font-family:var(--mono);color:var(--tuerkis);font-size:.85rem;
  min-width:110px}
.artzeile .bez{font-size:.85rem;color:var(--text);flex:1;word-break:break-word}

/* Formulare / Modal */
.modalbg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;
  display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--border);
  border-radius:18px 18px 0 0;width:100%;max-width:760px;max-height:88dvh;
  overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
.modal h2{font-size:1.05rem;margin-bottom:4px}
.modal .griff{width:44px;height:4px;border-radius:2px;background:var(--border);
  margin:0 auto 14px}
.typwahl{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.typwahl button{border:1px solid var(--border);border-radius:99px;
  padding:9px 16px;font-size:.85rem;min-height:44px;background:var(--panel2)}
.typwahl button.aktiv{border-color:var(--tuerkis);color:var(--tuerkis)}

.btnzeile{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;min-height:52px;border-radius:12px;font-size:.95rem;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:8px}
.btn.primaer{background:var(--blau);color:#fff}
.btn.primaer:active{background:#2f66b3}
.btn.sekundaer{background:var(--panel2);border:1px solid var(--border)}
.btn.gefahr{color:var(--rot);border:1px solid rgba(224,93,93,.4)}
.btn[disabled]{opacity:.5}

/* Bottom-Navigation */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:rgba(15,15,19,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  display:flex;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;color:var(--dim);font-size:.68rem;
  font-family:var(--mono);letter-spacing:.03em}
nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.aktiv{color:var(--tuerkis)}
nav .badge{position:absolute;transform:translate(14px,-26px);background:var(--rot);
  color:#fff;font-size:.62rem;border-radius:99px;min-width:16px;height:16px;
  display:flex;align-items:center;justify-content:center;padding:0 4px}

/* Leerzustand, Hinweise */
.leer{text-align:center;color:var(--dim);padding:36px 20px;font-size:.9rem}
.leer .gross{font-size:1.6rem;margin-bottom:8px;color:var(--border)}
.hinweis{background:rgba(224,180,93,.08);border:1px solid rgba(224,180,93,.3);
  border-radius:12px;padding:12px 14px;font-size:.83rem;color:var(--gelb);
  margin-bottom:12px}
.fehler{background:rgba(224,93,93,.08);border-color:rgba(224,93,93,.35);color:var(--rot)}

/* Toast */
#toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 20px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(20px);background:var(--panel2);
  border:1px solid var(--tuerkis);color:var(--text);padding:12px 20px;
  border-radius:12px;font-size:.85rem;opacity:0;pointer-events:none;
  transition:all .25s;z-index:60;white-space:nowrap}
#toast.zeig{opacity:1;transform:translateX(-50%) translateY(0)}

.zurueck{font-family:var(--mono);font-size:.8rem;color:var(--blau);
  padding:8px 0;margin-bottom:6px;display:inline-flex;align-items:center;gap:6px}
.fab{position:fixed;right:18px;bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom));
  width:58px;height:58px;border-radius:50%;background:var(--blau);color:#fff;
  font-size:1.7rem;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(58,123,213,.4);z-index:25}
.fab:active{background:#2f66b3}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media (min-width:700px){ /* Tablet: etwas Luft */
  main{padding:20px}
  .modalbg{align-items:center}
  .modal{border-radius:18px;max-height:80dvh}
}
</style>
</head>
<body>

<header>
  <span class="logo">Blueprint · <b>CRM</b></span>
  <span class="status"><span class="dot" id="statusDot"></span><span id="statusTxt">–</span></span>
</header>

<main id="view"></main>

<nav id="nav"></nav>
<div id="modalRoot"></div>
<div id="toast"></div>

<script>
/* ================= KONFIGURATION =================
   Nur hier anpassen — der Rest der App liest daraus. */
const KONFIG = {
  SUPABASE_URL : 'https://guuywhrzygcnpzrnnlsw.supabase.co',
  SUPABASE_KEY : 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dXl3aHJ6eWdjbnB6cm5ubHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MjcyOTIsImV4cCI6MjA5OTMwMzI5Mn0.tvPfk5j6mXNG2YcYl4cUR-rF-T3QWdTGuOZ8SHRSv2U',

  TAB_KONTAKTE : 'kontakte',                   // Bauvorhaben — bestehende TS-Suite-Tabelle
  TAB_KUNDEN   : 'kunden',                      // Kunden-Stammdaten (neu, Phase 1)
  TAB_AKT      : 'crm_aktivitaeten',
  TAB_WV       : 'crm_wiedervorlagen',
  TAB_AP       : 'crm_ansprechpartner',
  TAB_WARTUNG  : 'crm_wartungsplan',
  TAB_WARTUNGSPOS: 'crm_wartungspositionen',
  TAB_PREISE   : 'crm_preisliste',
  TAB_ANGEBOTE : 'crm_angebote',

  // Feld-Zuordnung für die kontakte-Tabelle (= Bauvorhaben).
  // kunde bleibt als Text-Fallback für Zeilen ohne kunde_id.
  FELD: {
    name    : ['bauvorhaben'],
    kunde   : ['kunde'],
    ap      : ['ansprechpartner'],
    telefon : ['telefon','tel','telefonnummer'],
    email   : ['email','mail','e_mail'],
    knr     : []
  },

  // Artikel: gleiches Drei-Schichten-Muster wie in der TS-Suite
  ARTIKEL_LS_KEY : 'artikelnummern',           // localStorage-Key ggf. anpassen
  ARTIKEL_URL    : 'artikel.json',             // relativ, liegt im selben Repo

  KUERZEL_LS_KEY : 'crm_kuerzel'               // eigenes Kürzel (z.B. GER)
};
</script>
<script>
/* ================= HELFER ================= */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const heute = () => new Date().toISOString().slice(0,10);

function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('zeig');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('zeig'), 2200);
}
function datumFmt(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}) +
    (iso.length > 10 ? ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '');
}
/* Feld-Mapping: erster vorhandener Kandidat gewinnt */
function feld(obj, key){
  for(const k of KONFIG.FELD[key] || []){
    if(obj && obj[k] != null && obj[k] !== '') return obj[k];
  }
  return '';
}
function feldName(key){ // in welcher Spalte wird geschrieben (für Neuanlage)
  return (KONFIG.FELD[key] || [])[0];
}

/* ================= SUPABASE (REST) ================= */
async function sb(pfad, opts = {}){
  const r = await fetch(`${KONFIG.SUPABASE_URL}/rest/v1/${pfad}`, {
    ...opts,
    headers: {
      'apikey': KONFIG.SUPABASE_KEY,
      'Authorization': `Bearer ${KONFIG.SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.method === 'POST' || opts.method === 'PATCH' ? 'return=representation' : '',
      ...(opts.headers || {})
    }
  });
  if(!r.ok){
    const txt = await r.text().catch(()=> '');
    throw new Error(`${r.status}: ${txt.slice(0,200)}`);
  }
  return r.status === 204 ? null : r.json();
}
function setStatus(ok, txt){
  $('#statusDot').className = 'dot ' + (ok === null ? '' : ok ? 'ok' : 'err');
  $('#statusTxt').textContent = txt;
}
/* Lädt eine Datei in den 'angebote'-Storage-Bucket hoch und gibt die
   öffentliche URL zurück. */
async function ladeAngebotDateiHoch(pfad, file){
  const res = await fetch(`${KONFIG.SUPABASE_URL}/storage/v1/object/angebote/${pfad}`, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + KONFIG.SUPABASE_KEY,
      'apikey': KONFIG.SUPABASE_KEY,
      'Content-Type': file.type || 'application/octet-stream',
      'x-upsert': 'true'
    },
    body: file
  });
  if(!res.ok) throw new Error('Datei-Upload fehlgeschlagen (' + res.status + ')');
  return `${KONFIG.SUPABASE_URL}/storage/v1/object/public/angebote/${pfad}`;
}

/* ================= ARTIKEL (3 Schichten) ================= */
let ARTIKEL = {};   // { key: nummer } — wie artikel.json der TS-Suite
async function ladeArtikel(){
  try{ // 1. localStorage (Admin-Panel-Overrides)
    const ls = localStorage.getItem(KONFIG.ARTIKEL_LS_KEY);
    if(ls){ ARTIKEL = {...ARTIKEL, ...JSON.parse(ls)}; }
  }catch(e){}
  try{ // 2. zentrale artikel.json
    const r = await fetch(KONFIG.ARTIKEL_URL, {cache:'no-store'});
    if(r.ok){
      const json = await r.json();
      ARTIKEL = {...json, ...ARTIKEL}; // localStorage behält Vorrang
    }
  }catch(e){}
  // 3. Fallback: leer — App funktioniert auch ohne Artikel
}
function artikelSuche(q){
  q = q.toLowerCase().trim();
  if(!q) return Object.entries(ARTIKEL).slice(0,30);
  return Object.entries(ARTIKEL)
    .filter(([key,nr]) => key.toLowerCase().includes(q) || String(nr).toLowerCase().includes(q))
    .slice(0,50);
}

/* ================= DATEN-CACHE ================= */
const cache = { kontakte:null, kunden:null, wv:null };

async function holeKontakte(neu = false){
  if(cache.kontakte && !neu) return cache.kontakte;
  cache.kontakte = await sb(`${KONFIG.TAB_KONTAKTE}?select=*&limit=1000`);
  return cache.kontakte;
}
async function holeKunden(neu = false){
  if(cache.kunden && !neu) return cache.kunden;
  cache.kunden = await sb(`${KONFIG.TAB_KUNDEN}?select=*&order=name.asc&limit=1000`);
  return cache.kunden;
}
async function holeOffeneWV(neu = false){
  if(cache.wv && !neu) return cache.wv;
  cache.wv = await sb(`${KONFIG.TAB_WV}?erledigt=eq.false&select=*&order=faellig_am.asc&limit=500`);
  return cache.wv;
}
/* Hilfsfunktionen für die verknüpfte Anzeige */
function kundeVon(kundeId){
  return kundeId && cache.kunden ? cache.kunden.find(ku => String(ku.id) === String(kundeId)) : null;
}
function bauvorhabenVon(kontaktId){
  return cache.kontakte ? cache.kontakte.find(k => String(k.id) === String(kontaktId)) : null;
}
function bauvorhabenAnzahl(kundeId){
  return cache.kontakte ? cache.kontakte.filter(k => String(k.kunde_id) === String(kundeId)).length : 0;
}

/* ================= ROUTING ================= */
const routen = {
  kunden      : () => zeigKunden(),
  kunde       : id => zeigKundeMaster(id),
  bauvorhaben : id => zeigBauvorhaben(id),
  unzugeordnet: () => zeigUnzugeordnet(),
  wv          : () => zeigWV(),
  artikel     : () => zeigArtikel(),
  preise      : () => zeigPreisliste()
};
function navigiere(hash){ location.hash = hash; }
async function route(){
  const [ , seite = 'kunden', param ] = location.hash.split('/');
  const fn = routen[seite] || routen.kunden;
  const kundenTab = ['kunden','kunde','bauvorhaben','unzugeordnet'].includes(seite);
  document.querySelectorAll('nav button').forEach(b =>
    b.classList.toggle('aktiv', b.dataset.ziel === seite ||
      (kundenTab && b.dataset.ziel === 'kunden')));
  try{ await fn(param); }
  catch(e){
    $('#view').innerHTML = `<div class="hinweis fehler">Verbindung fehlgeschlagen:<br>
      <span style="font-family:var(--mono);font-size:.75rem">${esc(e.message)}</span><br><br>
      Ist der Supabase-Key in der KONFIG eingetragen und das SQL-Setup ausgeführt?</div>`;
    setStatus(false, 'offline');
  }
}
window.addEventListener('hashchange', route);

/* ================= ANSICHT: KUNDENLISTE ================= */
let suchbegriff = '';
async function zeigKunden(){
  const v = $('#view');
  v.innerHTML = `<div class="suchzeile">
      <input id="suche" type="search" placeholder="Kunde suchen …"
        value="${esc(suchbegriff)}" autocomplete="off">
    </div><div id="unzugBanner"></div><div id="liste"><div class="leer">Lade Kunden …</div></div>
    <button class="fab" id="fabNeu" title="Neuer Kunde">+</button>`;
  $('#suche').addEventListener('input', e => {
    suchbegriff = e.target.value; renderKundenListe();
  });
  $('#fabNeu').onclick = () => modalNeuerKunde();
  await Promise.all([holeKunden(), holeKontakte()]);
  setStatus(true, cache.kunden.length + ' Kunden');
  const offen = cache.kontakte.filter(k => !k.kunde_id).length;
  $('#unzugBanner').innerHTML = offen
    ? `<button class="hinweis" style="width:100%;text-align:left;display:flex;align-items:center;gap:10px"
         onclick="navigiere('#/unzugeordnet')">
         ⚠ ${offen} Bauvorhaben ohne Kunde — jetzt zuordnen →</button>`
    : '';
  renderKundenListe();
}
function renderKundenListe(){
  const liste = $('#liste'); if(!liste || !cache.kunden) return;
  const q = suchbegriff.toLowerCase().trim();
  const gefiltert = !q ? cache.kunden : cache.kunden.filter(ku =>
    [ku.name, ku.telefon, ku.email, ku.notiz].some(w => String(w ?? '').toLowerCase().includes(q)));
  if(!gefiltert.length){

}

            </div>
            <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:12px">
              ${positionen.length ? positionen.map(p => {
                  const f = wartungsFaelligkeit(p, v);
                  const endpreis = positionEndpreis(p);
                  return `<div style="border-left:2px solid var(--border);padding-left:10px">
                    <div class="txt" style="font-size:.88rem">${p.stueckzahl > 1 ? p.stueckzahl + '× ' : ''}${esc(p.bezeichnung)}</div>
                    ${p.preis != null ? `<div class="datum" style="color:var(--dim)">${eur(p.preis)} je Stück${p.stueckzahl > 1 ? ' · ' + eur(p.preis * p.stueckzahl) + ' gesamt' : ''}</div>` : ''}
                    ${p.preis != null && p.rabatt_prozent ? `<div class="datum" style="color:var(--dim)">Rabatt: -${p.rabatt_prozent}%</div>

                    <div class="datum" style="color:var(--dim)">${p.intervall_monate === 6 ? 'halbjährlich' : 'jährlich'} ·
                      zuletzt ${p.letzte_wartung ? datumFmt(p.letzte_wartung) : 'noch nie'}</div>
                    <div class="datum ${f.status === 'faellig' || f.status === 'heute' ? f.status : ''}">

                      <button style="flex:1;min-width:110px;min-height:36px;border:1px solid var(--border);border-radius:10px;

              <button style="min-height:36px;border:1px dashed var(--border);border-radius:10px;
                background:none;font-size:.78rem;color:var(--dim)"

          </div>`;
        }).join('')
        : `<div class="leer" style="padding:12px">Noch kein Wartungsvertrag — mit ＋ anlegen.</div>`}

        <button class="plus" onclick="modalNeuesAngebot('${ku.id}')">＋</button></div>
      ${angebote.length ? angebote.map(a => `
        <div class="wv">
          <div style="flex:1">
            <div class="txt">${esc(a.bezeichnung)}</div>
            <div class="datum" style="color:${a.status==='angenommen'?'var(--gruen)':a.status==='abgelehnt'?'var(--rot)':'var(--gelb)'}">
              ${a.status==='angenommen'?'✓ Angenommen':a.status==='abgelehnt'?'✕ Abgelehnt':'○ Offen'}

          ${a.datei_url ? `<a href="${a.datei_url}" target="_blank" rel="noopener"
            style="align-self:center;font-size:1.2rem;text-decoration:none;padding:4px 6px">📎</a>` : ''}

/* ================= WARTUNGSPLAN ================= */
let kundeWartungsDaten = [];
let kundePositionenDaten = [];
let kundeAngeboteDaten = [];
function positionEndpreis(p){
  if(p.preis == null) return null;
  return p.rabatt_prozent ? p.preis * (1 - p.rabatt_prozent / 100) : p.preis;
}
function wartungsFaelligkeit(position, vertrag){
  const h = heute();
  if(vertrag.vertragsende && vertrag.vertragsende < h){
    return { datum: null, status: 'beendet', text: 'Vertrag beendet ' + datumFmt(vertrag.vertragsende) };
  }
  if(vertrag.vertragsbeginn && vertrag.vertragsbeginn > h){
    return { datum: null, status: 'kuenftig', text: 'Vertrag beginnt ' + datumFmt(vertrag.vertragsbeginn) };
  }
  if(!position.letzte_wartung) return { datum: null, status: 'faellig', text: 'sofort' };
  const d = new Date(position.letzte_wartung + 'T00:00:00');
  d.setMonth(d.getMonth() + position.intervall_monate);
  const datum = d.toISOString().slice(0, 10);
  const status = datum < h ? 'faellig' : datum === h ? 'heute' : '';
  return { datum, status, text: datumFmt(datum) + (status === 'faellig' ? ' · überfällig' : status === 'heute' ? ' · heute' : '') };
}
async function modalNeueWartung(kundeId){
  let wartungspreise = [];
  try{ wartungspreise = await sb(`${KONFIG.TAB_PREISE}?kategorie=eq.wartung&select=*&order=bezeichnung.asc`); }catch(e){}
  modal(`
    <h2>Neuer Wartungsvertrag</h2>
    <label>Erste Position — Bezeichnung</label>
    <input id="wpBez" placeholder="z.B. Schiebetür Haupteingang">

    <select id="wpIntervall">
      <option value="6">Halbjährlich</option>
      <option value="12" selected>Jährlich</option>
    </select>
    ${wartungspreise.length ? `
    <label>Preis aus Preisliste übernehmen (optional)</label>
    <select id="wpPreisWahl" onchange="if(this.value) document.getElementById('wpPreis').value = this.value">
      <option value="">— manuell eintragen —</option>
      ${wartungspreise.map(p => `<option value="${p.preis}">${esc(p.bezeichnung)} — ${eur(p.preis)}</option>`).join('')}
    </select>` : ''}
    <div style="display:flex;gap:10px">
      <div style="flex:2"><label>Preis (€) je Stück</label>
        <input id="wpPreis" type="number" inputmode="decimal" step="0.01" placeholder="0,00"></div>
      <div style="flex:1"><label>Stückzahl</label>
        <input id="wpStueck" type="number" inputmode="numeric" min="1" value="1"></div>
    </div>
    <label>Rabatt (%, optional)</label>
    <input id="wpRabatt" type="number" inputmode="decimal" step="0.1" min="0" max="100" placeholder="0">
    <label>Letzte Wartung dieser Position (optional — leer = sofort fällig)</label>
    <input type="date" id="wpLetzte">
    <p style="font-size:.75rem;color:var(--dim);margin-top:4px">Weitere Positionen — auch mit eigenem Preis und eigener Stückzahl — kannst du danach jederzeit im Vertrag ergänzen.</p>
    <label>Vertragsnummer (optional)</label>
    <input id="wpVertragsnr" placeholder="z.B. WV-2026-014">
    <label>Vertragsbeginn</label>
    <input type="date" id="wpBeginn" value="${heute()}">
    <label>Vertragsende (leer = unbefristet)</label>
    <input type="date" id="wpEnde">
    <label>Kündigungsfrist (Monate zum Vertragsende, optional)</label>
    <input id="wpKuendigung" type="number" inputmode="numeric" placeholder="z.B. 3">
    <label style="display:flex;align-items:center;gap:10px;text-transform:none;font-family:inherit;font-size:.88rem;color:var(--text)">
      <input type="checkbox" id="wpAutoVerlaengerung" checked style="width:22px;height:22px;min-height:0">
      Verlängert sich automatisch, wenn nicht gekündigt
    </label>
    <label>Notiz</label>
    <textarea id="wpNotiz" style="min-height:64px"></textarea>
    <div class="btnzeile">
      <button class="btn sekundaer" onclick="modalZu()">Abbrechen</button>
      <button class="btn primaer" onclick="speichereWartung('${kundeId}')">Anlegen</button>
    </div>`);
}
async function speichereWartung(kundeId){
  const bezeichnung = $('#wpBez').value.trim();
  if(!bezeichnung){ toast('Bezeichnung für die erste Position fehlt noch.'); return; }
  try{
    const [vertrag] = await sb(KONFIG.TAB_WARTUNG, { method:'POST', body: JSON.stringify({
      kunde_id: kundeId,
      vertragsnummer: $('#wpVertragsnr').value.trim() || null,
      vertragsbeginn: $('#wpBeginn').value || null,
      vertragsende: $('#wpEnde').value || null,
      kuendigungsfrist_monate: $('#wpKuendigung').value ? parseInt($('#wpKuendigung').value, 10) : null,
      automatische_verlaengerung: $('#wpAutoVerlaengerung').checked,
      notiz: $('#wpNotiz').value.trim() || null
    })});
    await sb(KONFIG.TAB_WARTUNGSPOS, { method:'POST', body: JSON.stringify({
      vertrag_id: vertrag.id,
      bezeichnung,
      intervall_monate: parseInt($('#wpIntervall').value, 10),
      preis: $('#wpPreis').value ? parseFloat($('#wpPreis').value.replace(',', '.')) : null,
      stueckzahl: parseInt($('#wpStueck').value, 10) || 1,
      rabatt_prozent: $('#wpRabatt').value ? parseFloat($('#wpRabatt').value.replace(',', '.')) : null,
      letzte_wartung: $('#wpLetzte').value || null
    })});
    modalZu(); toast('Wartungsvertrag angelegt ✓'); route();
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}
async function modalWartungBearbeiten(planId){
  const plan = kundeWartungsDaten.find(p => String(p.id) === String(planId));
  if(!plan) return;
  modal(`
    <h2>Wartungsvertrag bearbeiten</h2>
    <label>Vertragsnummer (optional)</label>
    <input id="wpVertragsnr" value="${esc(plan.vertragsnummer)}" placeholder="z.B. WV-2026-014">
    <label>Vertragsbeginn</label>
    <input type="date" id="wpBeginn" value="${plan.vertragsbeginn || ''}">
    <label>Vertragsende (leer = unbefristet)</label>
    <input type="date" id="wpEnde" value="${plan.vertragsende || ''}">
    <label>Kündigungsfrist (Monate zum Vertragsende, optional)</label>
    <input id="wpKuendigung" type="number" inputmode="numeric" value="${plan.kuendigungsfrist_monate != null ? plan.kuendigungsfrist_monate : ''}">
    <label style="display:flex;align-items:center;gap:10px;text-transform:none;font-family:inherit;font-size:.88rem;color:var(--text)">
      <input type="checkbox" id="wpAutoVerlaengerung" ${plan.automatische_verlaengerung ? 'checked' : ''} style="width:22px;height:22px;min-height:0">
      Verlängert sich automatisch, wenn nicht gekündigt
    </label>
    <label>Notiz</label>
    <textarea id="wpNotiz" style="min-height:64px">${esc(plan.notiz)}</textarea>
    <div class="btnzeile">
      <button class="btn sekundaer" onclick="modalZu()">Abbrechen</button>
      <button class="btn primaer" onclick="speichereWartungBearbeiten('${planId}')">Speichern</button>
    </div>
    <button class="btn gefahr" style="width:100%;margin-top:10px" onclick="wartungLoeschen('${planId}')">
      🗑 Ganzen Vertrag löschen (inkl. aller Positionen)</button>`);
}
async function wartungLoeschen(planId){
  const plan = kundeWartungsDaten.find(p => String(p.id) === String(planId));
  if(!plan || !confirm(`„${plan.bezeichnung}" wirklich löschen?`)) return;
  try{
    await sb(`${KONFIG.TAB_WARTUNG}?id=eq.${planId}`, { method:'DELETE' });
    modalZu(); toast('Wartungsplan gelöscht'); route();
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}
async function speichereWartungBearbeiten(planId){
  try{
    await sb(`${KONFIG.TAB_WARTUNG}?id=eq.${planId}`, { method:'PATCH', body: JSON.stringify({
      vertragsnummer: $('#wpVertragsnr').value.trim() || null,
      vertragsbeginn: $('#wpBeginn').value || null,
      vertragsende: $('#wpEnde').value || null,
      kuendigungsfrist_monate: $('#wpKuendigung').value ? parseInt($('#wpKuendigung').value, 10) : null,
      automatische_verlaengerung: $('#wpAutoVerlaengerung').checked,
      notiz: $('#wpNotiz').value.trim() || null
    })});
    modalZu(); toast('Gespeichert ✓'); route();
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}
async function positionErledigt(positionId){
  try{
    await sb(`${KONFIG.TAB_WARTUNGSPOS}?id=eq.${positionId}`, { method:'PATCH',
      body: JSON.stringify({ letzte_wartung: heute() }) });
    toast('Als erledigt markiert ✓'); route();
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}
async function positionWiedervorlageAnlegen(positionId){
  const position = kundePositionenDaten.find(p => String(p.id) === String(positionId));
  if(!position) return;
  const vertrag = kundeWartungsDaten.find(v => String(v.id) === String(position.vertrag_id));
  if(!vertrag) return;
  const f = wartungsFaelligkeit(position, vertrag);
  try{
    await sb(KONFIG.TAB_WV, { method:'POST', body: JSON.stringify({
      kunde_id: vertrag.kunde_id,
      titel: 'Wartung: ' + position.bezeichnung,
      faellig_am: f.datum || vertrag.vertragsbeginn || heute(),
      notiz: vertrag.notiz || null,
      erstellt_von: localStorage.getItem(KONFIG.KUERZEL_LS_KEY) || null
    })});
    cache.wv = null; toast('Wiedervorlage angelegt ✓'); route();
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }

/* ================= AUFTRAG EXPORTIEREN (für Arbeitsbericht) ================= */
let bauvorhabenExportDaten = null;
async function exportAuftrag(id){
  const d = bauvorhabenExportDaten;
  if(!d || String(d.k.id) !== String(id)){ toast('Bitte Seite neu laden und erneut versuchen.'); return; }

  const hinweisTeile = d.offeneWV.slice(0,3).map(w => w.titel).filter(Boolean);
  const daten = {
    typ: 'ts-auftrag',
    version: 1,
    erstellt_am: new Date().toISOString(),
    kunde_id: d.ku ? d.ku.id : null,
    kunde: d.ku ? d.ku.name : (feld(d.k,'kunde') || null),
    kontakt_id: d.k.id,
    bauvorhaben: feld(d.k,'name') || null,
    ansprechpartner: feld(d.k,'ap') || null,
    telefon: (d.ku && d.ku.telefon) || feld(d.k,'telefon') || null,
    email: (d.ku && d.ku.email) || feld(d.k,'email') || null,
    hinweis: hinweisTeile.length ? ('Offen: ' + hinweisTeile.join(' · ')) : null
  };
  const dateiname = 'auftrag-' + slugify(daten.bauvorhaben || 'ohne-namen') + '.json';
  const blob = new Blob([JSON.stringify(daten, null, 2)], { type: 'application/json' });

  try{
    const datei = new File([blob], dateiname, { type: 'application/json' });
    if(navigator.canShare && navigator.canShare({ files: [datei] })){
      await navigator.share({ files: [datei], title: 'Auftrag: ' + (daten.bauvorhaben || '') });
      return;
    }
  }catch(e){
    if(e.name === 'AbortError') return; // Nutzer hat den Teilen-Dialog abgebrochen
    // sonst: unten der Download-Fallback
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = dateiname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  toast('Auftragsdatei heruntergeladen');
}
function slugify(s){
  return String(s).toLowerCase()
    .replace(/[äöüß]/g, c => ({ä:'ae',ö:'oe',ü:'ue',ß:'ss'}[c]))
    .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 40) || 'auftrag';
}
function aktivitaetZeile(a, mitBauvorhaben){
  const b = (mitBauvorhaben && a.kontakt_id) ? bauvorhabenVon(a.kontakt_id) : null;
  return `<li class="t-${esc(a.typ)}">
      <div class="tlkopf"><span class="tltyp">${esc(TYPEN[a.typ] || a.typ)}</span>
        <span>${datumFmt(a.erstellt_am)}</span>
        ${a.erstellt_von ? `<span>· ${esc(a.erstellt_von)}</span>` : ''}</div>
      <p>${esc(a.text)}</p>
      ${b ? `<button class="kunde" onclick="navigiere('#/bauvorhaben/${b.id}')">${esc(feld(b,'name'))} →</button>`
        : (mitBauvorhaben && !a.kontakt_id ? `<span class="datum" style="color:var(--dim)">allgemein</span>` : '')}
      ${Array.isArray(a.artikel) && a.artikel.length ? `<div class="artchips">
        ${a.artikel.map(x => `<span class="chip">${esc(x.nr)}${x.key ? ' · ' + esc(x.key) : ''}</span>`).join('')}
      </div>` : ''}
    </li>`;
}
let wvSichtbar = {};
function wvZeile(w, kontext){
  wvSichtbar[w.id] = w;
  const h = heute();
  const cls = w.erledigt ? '' : w.faellig_am < h ? 'faellig' : w.faellig_am === h ? 'heute' : '';
  const b = (kontext !== 'keine' && w.kontakt_id) ? bauvorhabenVon(w.kontakt_id) : null;
  const kuVonB = b ? kundeVon(b.kunde_id) : null;
  const kuDirekt = (!w.kontakt_id && w.kunde_id) ? kundeVon(w.kunde_id) : null;
  let kontextZeile = '';
  if(kontext === 'global'){
    if(b) kontextZeile = `<button class="kunde" onclick="navigiere('#/bauvorhaben/${b.id}')">
        ${kuVonB ? esc(kuVonB.name) + ' · ' : ''}${esc(feld(b,'name'))} →</button>`;
    else if(kuDirekt) kontextZeile = `<button class="kunde" onclick="navigiere('#/kunde/${kuDirekt.id}')">
        ${esc(kuDirekt.name)} · allgemein →</button>`;
  } else if(kontext === 'kunde'){
    if(b) kontextZeile = `<button class="kunde" onclick="navigiere('#/bauvorhaben/${b.id}')">${esc(feld(b,'name'))} →</button>`;
    else if(!w.kontakt_id) kontextZeile = `<span class="datum" style="color:var(--dim)">allgemein</span>`;
  }
  return `<div class="wv ${w.erledigt ? 'erledigt' : ''}">
    <button class="box" onclick="wvToggle('${w.id}', ${!w.erledigt})">✓</button>
    <div style="flex:1">
      <div class="txt">${esc(w.titel)}</div>
      ${w.notiz ? `<div class="datum" style="color:var(--dim)">${esc(w.notiz)}</div>` : ''}
      <div class="datum ${cls}">fällig ${datumFmt(w.faellig_am)}
        ${cls === 'faellig' ? '· überfällig' : cls === 'heute' ? '· heute' : ''}</div>
      ${w.an_trello_gesendet_am ? `<div class="datum" style="color:var(--tuerkis)">✓ An Trello übergeben · ${datumFmt(w.an_trello_gesendet_am)}</div>` : ''}
      ${kontextZeile}
    </div>
    ${!w.erledigt ? `<button class="trello-btn ${w.an_trello_gesendet_am ? 'gesendet' : ''}" onclick="wvAnTrello('${w.id}')">
      ↗ ${w.an_trello_gesendet_am ? 'Erneut senden' : 'An Trello senden'}</button>` : ''}
    </div>`;
}
/* Erzeugt aus den Auftragsdaten ein einfaches, für jeden lesbares PDF —
   reines Base64 (ohne data:-Prefix), fürs Hochladen an die Edge Function. */
function auftragPdfBase64(auftrag){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFont('helvetica', 'bold'); doc.setFontSize(18);
  doc.text('Arbeitsauftrag', 15, 20);
  doc.setDrawColor(210); doc.line(15, 25, 195, 25);

  let y = 38;
  const zeile = (label, wert) => {
    if(!wert) return;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
    doc.text(label + ':', 15, y);
    doc.setFont('helvetica', 'normal');
    const lines = doc.splitTextToSize(String(wert), 125);
    doc.text(lines, 60, y);
    y += 7.5 * lines.length + 2;
  };
  zeile('Kunde', auftrag.kunde);
  zeile('Bauvorhaben', auftrag.bauvorhaben);
  zeile('Ansprechpartner', auftrag.ansprechpartner);
  zeile('Telefon', auftrag.telefon);
  zeile('E-Mail', auftrag.email);
  y += 4;
  zeile('Hinweis', auftrag.hinweis);

  doc.setFontSize(9); doc.setTextColor(150);
  doc.text('Erstellt am ' + new Date(auftrag.erstellt_am).toLocaleString('de-DE') + ' · TS-Suite CRM', 15, 285);

  return doc.output('datauristring').split(',')[1];
}
async function wvAnTrello(wvId){
  const w = wvSichtbar[wvId];
  if(!w) return;
  // Nur bei allgemeinen (kundendirekten) Wiedervorlagen ist das Bauvorhaben
  // unbekannt — hängt der Kunde mehrere Bauvorhaben, muss ausgewählt werden.
  if(!w.kontakt_id && w.kunde_id){
    await holeKontakte();
    const kandidaten = cache.kontakte.filter(k => String(k.kunde_id) === String(w.kunde_id));
    if(kandidaten.length > 1){
      modalBauvorhabenWahl(wvId, kandidaten);
      return;
    }
  }
  await wvAnTrelloAusfuehren(wvId, null);
}
function modalBauvorhabenWahl(wvId, kandidaten){
  modal(`

    <p style="font-size:.85rem;color:var(--dim);margin-top:4px">Dieser Kunde hat mehrere Bauvorhaben —
      welches soll auf der Trello-Karte und im Auftrag stehen?</p>

      <label style="display:flex;align-items:center;gap:10px;text-transform:none;font-family:inherit;
        font-size:.9rem;color:var(--text);padding:10px;border:1px solid var(--border);border-radius:10px">
        <input type="radio" name="bvWahl" value="" checked style="width:20px;height:20px;min-height:0">
        Kein bestimmtes Bauvorhaben (allgemein)
      </label>
      ${kandidaten.map(k => `
      <label style="display:flex;align-items:center;gap:10px;text-transform:none;font-family:inherit;
        font-size:.9rem;color:var(--text);padding:10px;border:1px solid var(--border);border-radius:10px">
        <input type="radio" name="bvWahl" value="${k.id}" style="width:20px;height:20px;min-height:0">
        ${esc(feld(k,'name') || '(ohne Namen)')}
      </label>`).join('')}
    </div>
    <div class="btnzeile">
      <button class="btn sekundaer" onclick="modalZu()">Abbrechen</button>
      <button class="btn primaer" onclick="waehleBauvorhabenUndSende('${wvId}')">Weiter</button>
    </div>`);
}
async function waehleBauvorhabenUndSende(wvId){
  const gewaehlt = document.querySelector('input[name="bvWahl"]:checked')?.value || null;
  modalZu();
  await wvAnTrelloAusfuehren(wvId, gewaehlt || null);
}
async function wvAnTrelloAusfuehren(wvId, gewaehlteBauvorhabenId){
  const w = wvSichtbar[wvId];
  if(!w) return;
  const b = gewaehlteBauvorhabenId ? bauvorhabenVon(gewaehlteBauvorhabenId)
    : (w.kontakt_id ? bauvorhabenVon(w.kontakt_id) : null);
  const ku = b ? kundeVon(b.kunde_id) : (w.kunde_id ? kundeVon(w.kunde_id) : null);
  const titelTeile = [ku?.name, b ? feld(b,'name') : null].filter(Boolean);
  const name = titelTeile.length ? titelTeile.join(', ') : w.titel;
  const telefon = (ku && ku.telefon) || (b && feld(b,'telefon')) || null;
  const email = (ku && ku.email) || (b && feld(b,'email')) || null;
  const hinweisText = [w.titel, w.notiz].filter(Boolean).join('\n\n');
  const kontaktZeile = [telefon ? 'Tel: ' + telefon : null, email ? 'E-Mail: ' + email : null].filter(Boolean).join(' · ');
  const berichtParams = new URLSearchParams();
  if(ku?.name) berichtParams.set('kunde', ku.name);
  if(b) berichtParams.set('bauvorhaben', feld(b,'name') || '');
  if(b && feld(b,'ap')) berichtParams.set('ansprechpartner', feld(b,'ap'));
  if(telefon) berichtParams.set('telefon', telefon);
  if(email) berichtParams.set('email', email);
  if(hinweisText) berichtParams.set('hinweis', hinweisText);
  if(ku?.id) berichtParams.set('kunde_id', ku.id);
  // Klammern werden von encodeURIComponent nicht escaped, könnten aber ein
  // Markdown-Link vorzeitig beenden — zur Sicherheit selbst kodieren.
  const berichtQuery = berichtParams.toString().replace(/\(/g, '%28').replace(/\)/g, '%29');
  const berichtLink = `https://stogerhost.github.io/Arbeitsbericht/arbeitsbericht.html?${berichtQuery}`;
  const desc = [hinweisText, kontaktZeile, `[Arbeitsbericht ausgefüllt öffnen](${berichtLink})`].filter(Boolean).join('\n\n');
  // Monatsanfang/-ende aus dem Fälligkeitsdatum für Start-/Fälligkeitsfeld der Trello-Karte
  let start = null, due = null;
  if(w.faellig_am){
    const [jahr, monat] = w.faellig_am.split('-').map(Number);
    const letzterTag = new Date(jahr, monat, 0).getDate();
    start = `${jahr}-${String(monat).padStart(2,'0')}-01`;
    due = `${jahr}-${String(monat).padStart(2,'0')}-${String(letzterTag).padStart(2,'0')}`;
  }
  const auftrag = {
    typ: 'ts-auftrag',
    version: 1,
    erstellt_am: new Date().toISOString(),
    kunde_id: ku ? ku.id : null,
    kunde: ku ? ku.name : null,
    kontakt_id: b ? b.id : null,
    bauvorhaben: b ? (feld(b,'name') || null) : null,
    ansprechpartner: b ? (feld(b,'ap') || null) : null,
    telefon,
    email,
    hinweis: hinweisText || null
  };
  try{
    const pdfBase64 = auftragPdfBase64(auftrag);
    const res = await fetch(`${KONFIG.SUPABASE_URL}/functions/v1/create-trello-card`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + KONFIG.SUPABASE_KEY,
        'apikey': KONFIG.SUPABASE_KEY
      },
      body: JSON.stringify({ name, desc, auftrag, pdfBase64, start, due })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    await sb(`${KONFIG.TAB_WV}?id=eq.${wvId}`, { method:'PATCH',
      body: JSON.stringify({ an_trello_gesendet_am: new Date().toISOString() }) });
    cache.wv = null;
    toast('Trello-Karte angelegt ✓');
    route();
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}
async function wvToggle(id, erledigt){
  await sb(`${KONFIG.TAB_WV}?id=eq.${id}`, { method:'PATCH',
    body: JSON.stringify({ erledigt, erledigt_am: erledigt ? new Date().toISOString() : null })});
  cache.wv = null; toast(erledigt ? 'Erledigt ✓' : 'Wieder offen'); route();
}

/* ================= ANSICHT: PREISLISTE ================= */

];

async function speicherePreisBearbeiten(preisId){

  if(isNaN(preis)){ toast('Preis fehlt noch.'); return; }
  try{

      bezeichnung, preis,
      einheit: $('#ppEinheit').value.trim() || null,

    })});

async function preisLoeschen(preisId){

<script>
/* ================= MODALS ================= */
function modal(html){
  $('#modalRoot').innerHTML = `<div class="modalbg" onclick="if(event.target===this)modalZu()">
    <div class="modal"><div class="griff"></div>${html}</div></div>`;
}
function modalZu(){ $('#modalRoot').innerHTML = ''; }

/* --- Neue Aktivität (mit Artikel-Verknüpfung) --- */
let aktArtikel = [];
function modalAktivitaet(zielTyp, zielId){
  aktArtikel = [];
  const kuerzel = localStorage.getItem(KONFIG.KUERZEL_LS_KEY) || '';
  modal(`
    <h2>Neue Aktivität</h2>
    <label>Art</label>
    <div class="typwahl" id="typWahl">
      ${Object.entries(TYPEN).map(([k,v],i) =>
        `<button data-typ="${k}" class="${i===0?'aktiv':''}">${v}</button>`).join('')}
    </div>
    <label>Was war los?</label>
    <textarea id="aktText" placeholder="z.B. Schiebetür EG klemmt, Kunde bittet um Termin nächste Woche …"></textarea>
    <label>Artikel verknüpfen (optional)</label>
    <input id="aktArtSuche" type="search" placeholder="Artikel suchen …" autocomplete="off">
    <div id="aktArtVorschlaege"></div>
    <div class="artchips" id="aktArtChips" style="margin-top:8px"></div>
    <label>Dein Kürzel</label>
    <input id="aktKuerzel" value="${esc(kuerzel)}" placeholder="z.B. GER" maxlength="6"
      style="max-width:140px;text-transform:uppercase">
    <label style="display:flex;align-items:center;gap:10px;text-transform:none;font-family:inherit;font-size:.88rem;color:var(--text)">
      <input type="checkbox" id="aktMitWV" style="width:22px;height:22px;min-height:0">
      Wiedervorlage dazu anlegen
    </label>
    <div id="aktWVBlock" style="display:none">
      <label>Fällig am</label>
      <input type="date" id="aktWVDatum" value="${heute()}">
    </div>
    <div class="btnzeile">
      <button class="btn sekundaer" onclick="modalZu()">Abbrechen</button>
      <button class="btn primaer" onclick="speichereAktivitaet('${zielTyp}','${zielId}')">Speichern</button>
    </div>`);
  $('#typWahl').addEventListener('click', e => {
    const b = e.target.closest('button'); if(!b) return;
    document.querySelectorAll('#typWahl button').forEach(x => x.classList.remove('aktiv'));
    b.classList.add('aktiv');
  });
  $('#aktMitWV').addEventListener('change', e =>
    $('#aktWVBlock').style.display = e.target.checked ? 'block' : 'none');
  $('#aktArtSuche').addEventListener('input', e => {
    const q = e.target.value.trim();
    const box = $('#aktArtVorschlaege');
    if(!q){ box.innerHTML = ''; return; }
    box.innerHTML = artikelSuche(q).slice(0,6).map(([key,nr]) => `
      <button class="artzeile" onclick="aktArtikelDazu('${esc(nr)}','${esc(key)}')">
        <span class="nr">${esc(nr)}</span><span class="bez">${esc(key)}</span>
      </button>`).join('');
  });
}
function aktArtikelDazu(nr, key){
  if(!aktArtikel.some(a => a.nr === nr)) aktArtikel.push({nr, key});
  $('#aktArtSuche').value = ''; $('#aktArtVorschlaege').innerHTML = '';
  renderAktChips();
}
function renderAktChips(){
  $('#aktArtChips').innerHTML = aktArtikel.map((a,i) =>
    `<span class="chip">${esc(a.nr)}<button onclick="aktArtikel.splice(${i},1);renderAktChips()">×</button></span>`).join('');
}
async function speichereAktivitaet(zielTyp, zielId){
  const text = $('#aktText').value.trim();
  if(!text){ toast('Bitte kurz beschreiben, was war.'); return; }
  const typ = $('#typWahl .aktiv')?.dataset.typ || 'notiz';
  const kuerzel = $('#aktKuerzel').value.trim().toUpperCase();
  if(kuerzel) localStorage.setItem(KONFIG.KUERZEL_LS_KEY, kuerzel);
  const zielFeld = zielTyp === 'kunde' ? { kunde_id: zielId } : { kontakt_id: zielId };
  try{
    await sb(KONFIG.TAB_AKT, { method:'POST', body: JSON.stringify({
      ...zielFeld, typ, text,
      artikel: aktArtikel.length ? aktArtikel : null,
      erstellt_von: kuerzel || null
    })});
    if($('#aktMitWV').checked){
      await sb(KONFIG.TAB_WV, { method:'POST', body: JSON.stringify({
        ...zielFeld,
        titel: TYPEN[typ] + ': ' + text.slice(0,60),
        faellig_am: $('#aktWVDatum').value || heute(),
        erstellt_von: kuerzel || null
      })});
      cache.wv = null;
    }
    modalZu(); toast('Gespeichert ✓'); route();
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}

/* --- Kunde bearbeiten --- */
function modalKundeBearbeiten(kundeId){
  const ku = kundeVon(kundeId); if(!ku) return;
  modal(`
    <h2>Kunde bearbeiten</h2>
    <label>Name</label><input id="keName" value="${esc(ku.name)}">
    <label>Telefon</label><input id="keTel" type="tel" inputmode="tel" value="${esc(ku.telefon)}">
    <label>E-Mail</label><input id="keMail" type="email" inputmode="email" value="${esc(ku.email)}">
    <label>Notiz</label><textarea id="keNotiz" style="min-height:64px">${esc(ku.notiz)}</textarea>
    <div class="btnzeile">
      <button class="btn sekundaer" onclick="modalZu()">Abbrechen</button>
      <button class="btn primaer" onclick="speichereKundeBearbeiten('${kundeId}')">Speichern</button>
    </div>
    <button class="btn gefahr" style="width:100%;margin-top:10px" onclick="modalKundeLoeschen('${kundeId}')">
      🗑 Kunde löschen</button>`);
}
function modalKundeLoeschen(kundeId){
  const ku = kundeVon(kundeId); if(!ku) return;
  const anzahl = bauvorhabenAnzahl(kundeId);
  if(anzahl > 0){
    toast(`Kann nicht gelöscht werden — hat noch ${anzahl} Bauvorhaben. Erst umziehen oder entfernen.`);
    return;
  }
  modal(`
    <h2>Kunde endgültig löschen?</h2>
    <p style="font-size:.88rem;margin-top:8px">„${esc(ku.name)}" wird unwiderruflich gelöscht.</p>
    <p style="font-size:.8rem;color:var(--dim);margin-top:8px">
      Wartungsplan sowie alle direkt an diesem Kunden hängenden Notizen und Wiedervorlagen
      werden mitgelöscht. Das lässt sich nicht rückgängig machen.</p>
    <div class="btnzeile">
      <button class="btn sekundaer" onclick="modalZu()">Abbrechen</button>
      <button class="btn gefahr" onclick="speichereKundeLoeschen('${kundeId}')">Endgültig löschen</button>
    </div>`);
}
async function speichereKundeLoeschen(kundeId){
  try{
    await sb(`${KONFIG.TAB_KUNDEN}?id=eq.${kundeId}`, { method:'DELETE' });
    cache.kunden = null; modalZu(); toast('Kunde gelöscht'); navigiere('#/kunden');
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}
async function speichereKundeBearbeiten(kundeId){
  const name = $('#keName').value.trim();
  if(!name){ toast('Name fehlt noch.'); return; }
  try{
    await sb(`${KONFIG.TAB_KUNDEN}?id=eq.${kundeId}`, { method:'PATCH', body: JSON.stringify({
      name,
      telefon: $('#keTel').value.trim() || null,
      email:   $('#keMail').value.trim() || null,
      notiz:   $('#keNotiz').value.trim() || null
    })});
    cache.kunden = null; modalZu(); toast('Gespeichert ✓'); route();
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}

function modalNeuesBauvorhaben(kundeId){

  modal(`
    <h2>Neues Bauvorhaben</h2>

    <label>Bauvorhaben</label><input id="nbName" placeholder="z.B. Eingang Bücherei KUZ">

    </div>`);
}
async function speichereNeuesBauvorhaben(kundeId){
  const name = $('#nbName').value.trim();
  if(!name){ toast('Bauvorhaben fehlt noch.'); return; }
  const ku = kundeVon(kundeId);
  const zeile = { bauvorhaben: name, kunde_id: kundeId, kunde: ku ? ku.name : null };

  try{

    cache.kontakte = null; modalZu(); toast('Bauvorhaben angelegt ✓');
    navigiere('#/bauvorhaben/' + neu.id);
  }catch(e){
    toast('Fehler — gibt es dieses Bauvorhaben schon?');
    console.error(e);
  }
}

/* --- Bauvorhaben ohne Kunde zuordnen --- */
function modalZuordnen(kontaktId, vorschlagName){
  const treffer = (cache.kunden || []);
  modal(`
    <h2>Kunde zuordnen</h2>
    <label>Kunde suchen</label>
    <input id="zoSuche" type="search" placeholder="Namen tippen …" autocomplete="off">
    <div id="zoTreffer" style="max-height:40vh;overflow-y:auto;margin-top:4px"></div>
    ${vorschlagName ? `
      <label>Oder neu anlegen</label>
      <button class="btn sekundaer" style="width:100%" onclick="zuordnenNeuerKunde('${kontaktId}')">
        „${esc(vorschlagName)}" als neuen Kunden anlegen</button>` : ''}
    <div class="btnzeile"><button class="btn sekundaer" style="flex:1" onclick="modalZu()">Abbrechen</button></div>`);
  const render = q => {
    q = (q || '').toLowerCase().trim();
    const liste = !q ? treffer : treffer.filter(ku => ku.name.toLowerCase().includes(q));
    $('#zoTreffer').innerHTML = liste.slice(0,30).map(ku => `
      <button class="artzeile" onclick="zuordnenSpeichern('${kontaktId}','${ku.id}')">
        <span class="bez">${esc(ku.name)}</span>
      </button>`).join('') || `<div class="leer" style="padding:12px">Keinen gefunden.</div>`;
  };
  $('#zoSuche').addEventListener('input', e => render(e.target.value));
  render('');
}
async function zuordnenSpeichern(kontaktId, kundeId){
  try{
    await sb(`${KONFIG.TAB_KONTAKTE}?id=eq.${kontaktId}`, { method:'PATCH',
      body: JSON.stringify({ kunde_id: kundeId }) });
    cache.kontakte = null; modalZu(); toast('Zugeordnet ✓'); route();
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}
async function zuordnenNeuerKunde(kontaktId){
  const k = bauvorhabenVon(kontaktId);
  const name = feld(k, 'kunde').trim();
  if(!name){ toast('Kein Name vorgeschlagen.'); return; }
  try{
    const [neu] = await sb(KONFIG.TAB_KUNDEN, { method:'POST', body: JSON.stringify({ name }) });
    await zuordnenSpeichern(kontaktId, neu.id);
  }catch(e){ toast('Fehler: ' + e.message.slice(0,80)); }
}
